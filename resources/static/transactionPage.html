          <div class="receiver-and-category">
            <label for="receiver" class="label">Receiver</label>

            <div class="input-box">
              <input
                id="receiver"
                type="text"
                name="receiver"
                placeholder="receiver"
              />
            </div>

            <label for="categories" class="label">Category</label>
            <div class="input-box">
              <select id="categories" name="category">

                <option value="2">Groceries</option>
                <option value="3">Rent</option>
                <option value="4">Restaurant</option>
                <option value="5">Travel</option>
                <option value="6">Entertainment</option>
                <option value="7">Internet</option>
                <option value="8">Taxi</option>
                <option value="10">Shopping</option>


              </select>
            </div>
          </div>
          <div class="date-and-amt">
            <label for="date" class="label">Date</label>
            <div class="input-box">
              <input id="date" type="date" name="date" />
            </div>

            <label for="amount" class="label">Amount</label>
            <div class="input-box">
              <input id="amount" type="number" name="amount" />
            </div>
          </div>
          <label for="notes" class="label">Notes</label>
          <div class="input-box">
            <input id="notes" type="text" name="taskDescription" />
          </div>

          <input id="post-transaction" type="submit" value="save" />

        </form>
